# Apache proxy for the private Vaelinya Command Centre bridge.
# Enable required modules first:
#   sudo a2enmod proxy proxy_http headers

ProxyPreserveHost On
ProxyPass        /private/api/lina-command-centre/ http://127.0.0.1:3771/private/api/lina-command-centre/
ProxyPassReverse /private/api/lina-command-centre/ http://127.0.0.1:3771/private/api/lina-command-centre/

<Location "/private/api/lina-command-centre/">
    Require all granted
    RequestHeader set X-Forwarded-Proto "https"
</Location>

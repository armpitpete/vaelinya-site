      <stop offset="0.38" stop-color="#b3f3ff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#1d122e" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-8%" y="-8%" width="116%" height="116%">

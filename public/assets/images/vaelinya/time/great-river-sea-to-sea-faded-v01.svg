<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1916 821" role="img" aria-labelledby="title desc">
  <title id="title">The Great River of Vaelinya</title>
  <desc id="desc">A wide aerial view of Vaelinya’s great river running from one sea to another, with wetlands, crossings, settlements, and misted banks.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#284368"/>
      <stop offset="0.42" stop-color="#547f82"/>
      <stop offset="1" stop-color="#d8bd78"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4e704d"/>
      <stop offset="0.38" stop-color="#8b9452"/>
      <stop offset="0.65" stop-color="#6f7f45"/>
      <stop offset="1" stop-color="#384f47"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ed4e8"/>
      <stop offset="0.25" stop-color="#4ea9ca"/>
      <stop offset="0.52" stop-color="#9fe9f0"/>
      <stop offset="0.78" stop-color="#3f8fb4"/>
      <stop offset="1" stop-color="#78d0e8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="47%" r="60%">

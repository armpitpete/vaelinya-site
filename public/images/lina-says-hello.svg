<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Lina says hello</title>
  <desc id="desc">Lina smiles warmly and raises one hand in greeting.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9c9ff"/>
      <stop offset="0.45" stop-color="#fff1d7"/>
      <stop offset="1" stop-color="#b7d1ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="48%">
      <stop offset="0" stop-color="#fff8df" stop-opacity="0.96"/>
      <stop offset="0.56" stop-color="#f4dcb5" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#8c79c5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#667352"/>
      <stop offset="1" stop-color="#394934"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6870"/>
      <stop offset="1" stop-color="#24484e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">

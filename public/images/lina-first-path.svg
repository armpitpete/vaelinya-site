      <stop offset="0%" stop-color="#fff1b7"/>
      <stop offset="42%" stop-color="#ffe0ef"/>
      <stop offset="100%" stop-color="#e4e8ff"/>
    </radialGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="48%" stop-color="#ffe577"/>
      <stop offset="100%" stop-color="#c1447a"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1f1730" flood-opacity="0.18"/>
    </filter>
  </defs>


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title desc">
  <title id="title">Lina first path</title>
  <desc id="desc">A gentle Vaelinya image for Lina: a small figure on a glowing bridge path under soft stars, with listening-stone and bridge-light symbols nearby.</desc>

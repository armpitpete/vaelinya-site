  <title id="title">Begin the journey into Vaelinya</title>
  <desc id="desc">A soft Vaelinya storybook landscape with a stone path, glowing gateway, carved stones, two moons, stars, mist, trees, and warm lights.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17144d"/>
      <stop offset="0.42" stop-color="#5a338b"/>
      <stop offset="0.72" stop-color="#a36580"/>
      <stop offset="1" stop-color="#1e1743"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe2a6"/>
      <stop offset="0.45" stop-color="#c28b5c"/>
      <stop offset="1" stop-color="#765548"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7b37c"/>
      <stop offset="0.55" stop-color="#8d6a61"/>
      <stop offset="1" stop-color="#48394b"/>
    </linearGradient>
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0" stop-color="#fff2b5"/>
      <stop offset="0.36" stop-color="#ffd07b"/>
      <stop offset="0.72" stop-color="#b66bb0" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#4a2c76" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lantern" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff7c1"/>
      <stop offset="0.5" stop-color="#ffbf4f"/>
      <stop offset="1" stop-color="#ffbf4f" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

